<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة البرومبتس</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        input { width: 100%; padding: 10px; font-size: 16px; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        #result { background: #f5f5f5; padding: 15px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>🤖 أداة إنشاء البرومبتس</h1>
    <p>اكتب فكرتك البسيطة:</p>
    <input type="text" id="idea" placeholder="مثال: صورة قطة في الصحراء">
    <br>
    <button onclick="sendRequest()">🚀 أنشئ البرومبت</button>
    <div id="result"></div>

    <script>
        async function sendRequest() {
            const idea = document.getElementById('idea').value;
            const resultDiv = document.getElementById('result');

            if (!idea.trim()) {
                resultDiv.innerHTML = '⚠️ الرجاء إدخال فكرة.';
                return;
            }

            resultDiv.innerHTML = '⏳ جاري العمل...';

            try {
                // ✅ المسار الصحيح: '/api/generate'
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idea: idea })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'حدث خطأ غير معروف');
                }

                resultDiv.innerHTML = '✅ البرومبت المُولّد:\n\n' + data.prompt;
            } catch (error) {
                resultDiv.innerHTML = '❌ فشل في إنشاء البرومبت: ' + error.message;
            }
        }
    </script>
</body>
</html>
